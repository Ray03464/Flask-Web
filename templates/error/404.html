<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom right, #fff0f5, #ffe4e1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
    }
    .error-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 3rem 2rem;
      text-align: center;
      max-width: 600px;
    }
    .error-title {
      font-size: 6rem;
      font-weight: bold;
      color: #d63384;
    }
    .error-subtitle {
      font-size: 1.25rem;
      color: #555;
    }
    .btn-elegant {
      background-color: #d63384;
      color: white;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      transition: all 0.3s ease;
    }
    .btn-elegant:hover {
      background-color: #c2185b;
      transform: scale(1.05);
    }
    .tagline {
      font-style: italic;
      color: #777;
      margin-top: 1.5rem;
    }
    .perfume-icon {
      font-size: 3.5rem;
      color: #e83e8c;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div class="error-card">
    <!-- Perfume bottle emoji -->
    <div class="perfume-icon">💐</div>

    <!-- Error Number -->
    <h1 class="error-title">404</h1>

    <!-- Message -->
    <p class="error-subtitle">Oops! The fragrance you’re searching for has drifted away in the mist...</p>

    <!-- Back Home Button -->
    <a href="/" class="btn btn-elegant mt-4">Back to Home</a>

    <!-- Tagline -->
    <p class="tagline">Like a rare perfume, some pages are hard to find.</p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
