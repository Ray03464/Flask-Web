<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>403 - Forbidden</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at top left, #fff8fb 0%, #fff2f4 30%, #ffeef0 100%);
      font-family: 'Georgia', serif;
      margin: 0;
    }

    .error-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      padding: 2.5rem;
      max-width: 700px;
      text-align: center;
    }

    .perfume-icon {
      color: #d63384;
      margin-bottom: 1rem;
    }
    .perfume-icon svg {
      width: 90px;
      height: 90px;
    }

    .error-code {
      font-size: 5rem;
      font-weight: bold;
      color: #d63384;
      margin-bottom: .5rem;
    }

    .error-text {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .btn-rose {
      background-color: #d63384;
      color: #fff;
      border-radius: 999px;
      padding: 0.6rem 1.8rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-rose:hover {
      background-color: #c2185b;
      transform: translateY(-2px);
      color: #fff;
    }

    .tagline {
      margin-top: 1.5rem;
      font-style: italic;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="error-card">
    <!-- Perfume Lock Icon (forbidden feel) -->
    <div class="perfume-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor"
           stroke-width="1.4" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="10" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <!-- Error Content -->
    <h1 class="error-code">403</h1>
    <p class="error-text">Access denied.<br>
      This fragrance is too exclusive for your pass.</p>

    <!-- Buttons -->
    <a href="/" class="btn-rose">Back to Home</a>

    <!-- Tagline -->
    <p class="tagline">Some perfumes are meant only for the chosen few.</p>
  </div>

</body>
</html>
